name: Deploy frontend to Hostinger

# Runs on every push to main AND can be triggered manually.
# The actual FTP upload only runs once you've added the FTP_* secrets, so this
# never fails red before it's configured — it just builds and skips the upload.
on:
  workflow_dispatch:
  push:
    branches: [main]

# Required repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER    e.g. ftp.your-domain.com   (hPanel → Files → FTP Accounts)
#   FTP_USERNAME  your FTP username
#   FTP_PASSWORD  your FTP password
# Optional repository variable:
#   VITE_API_URL  https://your-api.onrender.com/api   (baked into the build)

jobs:
  deploy:
    name: Build & upload to public_html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Check FTP secrets
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP secrets not set — built the site but skipped the upload. Add FTP_SERVER/FTP_USERNAME/FTP_PASSWORD to enable deploys."
          fi

      - name: Deploy via FTP
        if: steps.ftp.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/
          dangerous-clean-slate: false
